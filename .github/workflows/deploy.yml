name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 手動実行も許可する
  workflow_dispatch:

# GITHUB_TOKEN に Pages へデプロイする権限を与える
permissions:
  contents: read
  pages: write
  id-token: write

# 進行中のデプロイは中断せず、後続をまとめて1回にする
concurrency:
  group: pages
  cancel-in-progress: false

# 上のactionsはいずれもNode 24で動く版に上げてある。
# 古い版のままだと「Node.js 20 is deprecated」の警告が出て、いずれ動かなくなる。
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # 壊れたまま公開しないよう、ビルド前に検証する
      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src

      - name: Test
        run: npm test

      - name: Build (static export)
        env:
          NEXT_STATIC_EXPORT: "1"
          # GitHub Pages はリポジトリ名のサブパス配下で配信されるため合わせる
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      # GitHub Pages は _next のようなアンダースコア始まりのパスを
      # Jekyll が除外してしまうため、.nojekyll を置いて無効化する
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
